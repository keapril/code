name: Streamlit Heartbeat

on:
  schedule:
    # 每天 UTC 00:00 跑一次，僅備用確認 App 存活
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: read  # 只需讀取，不做任何 push/commit

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: 取得專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝瀏覽器自動化套件 (Selenium)
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: 執行定時喚醒腳本
        run: python .github/scripts/keep_alive.py

      - name: 上傳截圖以供除錯
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-screenshots
          path: '*.png'
          retention-days: 7
