name: Streamlit Heartbeat

on:
  schedule:
    # 建議改成每 4 小時執行一次，避免被 Github 視為濫用或提早停權
    - cron: '0 */4 * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: 取得專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝瀏覽器自動化套件 (Selenium)
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: 執行定時喚醒腳本
        run: python .github/scripts/keep_alive.py

      - name: 上傳截圖以供除錯
        uses: actions/upload-artifact@v4
        if: always() # 確保無論成功或失敗都會上傳
        with:
          name: selenium-screenshots
          path: '*.png'
          retention-days: 7

      - name: 保持 Github Actions 活躍 (避免 60 天未提交被暫停)
        uses: gautamkrishnar/keepalive-workflow@v2
